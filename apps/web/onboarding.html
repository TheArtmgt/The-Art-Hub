<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding - The Art Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div><strong>The Art Hub</strong></div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="feed.html">Feed</a></li>
          <li><a href="gigs/index.html">Gigs</a></li>
          <li><a href="messages.html">Messages</a></li>
        </ul>
      </nav>
      <a class="btn" href="profile.html">My Profile</a>
    </header>

    <main class="section">
      <h1 class="page-title">Complete your profile</h1>
      <form class="form">
        <label>
          Display name
          <input type="text" placeholder="DJ Ada" />
        </label>
        <label>
          Skills / tags
          <input type="text" placeholder="Producer, Video Editor" />
        </label>
        <label>
          Creative categories
          <select multiple>
            <option>Music</option>
            <option>Visual Art</option>
            <option>Design</option>
            <option>Video</option>
            <option>Writing</option>
            <option>Photography</option>
          </select>
        </label>
        <label>
          Location (State)
          <input type="text" placeholder="Lagos" />
        </label>
        <label>
          City
          <input type="text" placeholder="Surulere" />
        </label>
        <label>
          LGA (optional)
          <input type="text" placeholder="Surulere" />
        </label>
        <label>
          Primary music genre (if Music)
          <input type="text" placeholder="Afrobeats" />
        </label>
        <button class="btn" type="button">Save & Continue</button>
      </form>
    </main>
  </body>
</html>
