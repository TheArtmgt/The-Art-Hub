<main class="main container">
      <h2 class="page-title">Feed</h2>
      <section class="cards">
        <article class="card feed-card">
          <div class="thumbnail"></div>
          <h3>New Track</h3>
          <p class="muted">youtube.com/...</p>
          <div class="action-row">
            <button class="btn btn-secondary">Like</button>
            <button class="btn btn-secondary">Comment</button>
          </div>
        </article>

        <article class="card feed-card">
          <div class="thumbnail"></div>
          <h3>Behind the Scenes</h3>
          <p class="muted">Shot in Yaba, Lagos.</p>
          <div class="action-row">
            <button class="btn btn-secondary">Like</button>
            <button class="btn btn-secondary">Comment</button>
          </div>
        </article>

        <article class="card">
          <h3>Share a Post</h3>
          <form class="form">
            <label>Content link <input type="url" placeholder="https://youtube.com/..." /></label>
            <label>Caption <textarea rows="4" placeholder="Tell your story"></textarea></label>
            <button class="btn btn-primary" type="button">Publish</button>
          </form>
        </article>
      </section>
    </main>
