<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post a Gig - The Art Hub</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header>
      <div><strong>The Art Hub</strong></div>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="../feed.html">Feed</a></li>
          <li><a href="index.html">Gigs</a></li>
          <li><a href="../messages.html">Messages</a></li>
        </ul>
      </nav>
      <a class="btn" href="../tokens.html">Activate Access</a>
    </header>

    <main class="section">
      <h1 class="page-title">Post a Gig</h1>
      <form class="form">
        <label>Title <input type="text" placeholder="Afrobeats EP Mix" /></label>
        <label>Description <textarea rows="4" placeholder="Describe the scope"></textarea></label>
        <label>Required skills <input type="text" placeholder="Mixing, Mastering" /></label>
        <label>Budget (NGN) <input type="number" placeholder="150000" /></label>
        <label>Deadline <input type="date" /></label>
        <label>
          Location
          <select>
            <option>Remote</option>
            <option>In-person</option>
          </select>
        </label>
        <button class="btn" type="button">Publish (Token gated)</button>
      </form>
    </main>
  </body>
</html>
